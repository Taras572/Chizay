<div class="container">
    <h1>Корзина</h1>
    <div *ngIf="!basket.length">
        <p class="cart-empty woocommerce-info">Ваша корзина зараз порожня.</p>
        <p class="return-to-shop">
            <a class="button wc-backward" [routerLink]="[ '/shop' ]">Повернутись в магазин </a>
        </p>
    </div>
</div>

<!-- --------------------- -->
<div class="container">
    <div class="row">
        <div class="col-lg-12 mt-5" *ngIf="basket.length">
            <div class="row">
                <div class="col-lg-12 col-lg-push-6 col-my-lt-12">
                    <div class="payItems smallSlideLeft animationDelay-1">
                        <div class="table">
                            <div class="tr thead">
                                <div class="tr">
                                    <div class="td"></div>
                                    <div class="td">Товар</div>
                                    <div class="td">Ціна</div>
                                    <div class="td">Кількість</div>
                                    <div class="td">Загалом</div>
                                </div>
                            </div>
                            <div class="tr tbody">
                                <div class="tr productOrder" *ngFor="let order of basket">
                                    <div class="td">
                                        <div class="delateProduct remove-cart-product-popup open-popup"
                                            (click)="removeProduct(order)">
                                        </div>
                                    </div>
                                    <div class="td">
                                        <div class="smallProduct">
                                            <a class="imgWrapper"
                                                [style.backgroundImage]="'url('+ order.image +')'"></a>
                                            <div class="smallProductInfo">
                                                <h6 class="h6 as"><a>{{order.name}}</a>
                                                </h6>
                                                <p></p>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="td">
                                        <div class="singleItemPrice">
                                            <span> {{order.price}}</span><i>грн</i>
                                        </div>
                                    </div>
                                    <div class="td">
                                        <div class="count-modal">
                                            <input class="model-numb" type="text" maxlength="3" [value]="order.count">
                                            <div>
                                                <div class="modal-plus" (click)="productCount(order,true)"><i class="uil uil-plus"></i></div>
                                                <div class="modal-minus" (click)="productCount(order,false)"><i class="uil uil-minus"></i></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="td">
                                        <div class="itemPrice productPrice">
                                            <b class="tableMobTitle">Загалом: </b><span>{{order.count *
                                                order.price}}</span><i>грн</i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="tr tfoot">
                                <div class="td">
                                    <div class="fullPrice cart-total">
                                        <div class="subFullPrice" style="display:none;">
                                            <span>299</span>
                                            <i>грн</i>
                                        </div>
                                        <div class="totalFullPrice" style="display:block;">
                                            <p>Загалом:</p>
                                            <span>{{totalPrice}}</span>
                                            <i>грн</i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="btnWrapper txtRight fadeInTop mt-3">
                        <div class="emptySpace40 emptySpace-xs20"></div>
                        <div class="payCheckboxs text-left">
                            <label class="checkboxEntry radio ">
                                <input id="pay" type="radio" name="payment-type" value="cash" class="payment-cash"
                                    checked="checked"><span>Оплата готівкою</span>
                            </label>
                            <label class="checkboxEntry radio ml-3">
                                <input id="pay2" type="radio" name="payment-type" value="card"
                                    class="payment-card"><span>Безготівкова
                                    оплата</span>
                            </label>
                        </div>
                        <div class="emptySpace40"></div>
                    </div>
                    <div class="emptySpace-lt60 emptySpace-md45 emptySpace-xs25"></div>
                </div>
                <div class="col-lg-12 col-lg-pull-6 col-my-lt-12 paySelect">
                    <h6 class="h6 as smallSlideRight animationDelay-1">Оберіть спосіб доставки</h6>
                    <div class="emptySpace30"></div>
                    <div class="payForm smallSlideRight">
                        <form [formGroup]="orderForm" id="make-order-form">
                            <input type="hidden" name="payment_type" value="cash">
                            <div class="deliveryCheckboxs">
                                <label class="checkboxEntry radio">
                                    <input type="radio" name="delivery" value="delivery"
                                        checked="checked"><span>Доставка</span>
                                </label>
                                <label class="checkboxEntry radio ml-3">
                                    <input type="radio" name="delivery" value="advance"><span>Заздалегідь</span>
                                </label>
                            </div>
                            <div class="emptySpace20 emptySpace-xs15"></div>
                            <label class="inputWrapper ">
                                <i>Ваше имя*</i>
                                <span>
                                    <input class="simpleInput name" formControlName="userName" type="text" value=""
                                        maxlength="60">
                                </span>
                                <span class="firstBorderElement"></span>
                                <span class="secondBorderElement"></span>
                            </label>
                            <div class="emptySpace10"></div>
                            <label class="inputWrapper ">
                                <i>Телефон*</i>
                                <span><input class="simpleInput" formControlName="userPhone" type="text"></span>
                                <span class="firstBorderElement"></span>
                                <span class="secondBorderElement"></span>
                            </label>
                            <div class="emptySpace10"></div>
                            <label class="inputWrapper ">
                                <i>Місто*</i>
                                <span><input class="simpleInput" formControlName="userCity" type="text"></span>
                                <span class="firstBorderElement"></span>
                                <span class="secondBorderElement"></span>
                            </label>
                            <div class="emptySpace10"></div>
                            <label class="inputWrapper ">
                                <i>Вулиця*</i>
                                <span><input class="simpleInput" formControlName="userStreet" type="text"></span>
                                <span class="firstBorderElement"></span>
                                <span class="secondBorderElement"></span>
                            </label>
                            <div class="emptySpace10"></div>
                            <label class="inputWrapper ">
                                <i>Будинок*</i>
                                <span><input class="simpleInput" formControlName="userHouse" type="text"></span>
                                <span class="firstBorderElement"></span>
                                <span class="secondBorderElement"></span>
                            </label>
                            <div class="emptySpace10"></div>
                            <label class="inputWrapper ">
                                <i class="textarea">Ваш коментар</i>
                                <span><textarea class="simpleInput" formControlName="userComment" id="" maxlength="256"
                                        cols="30" rows="10"></textarea></span>
                                <span class="firstBorderElement"></span>
                                <span class="secondBorderElement"></span>
                            </label>
                            <div class="emptySpace10"></div>
                            <input type="submit" style="display: none">
                        </form>
                        <div class="emptySpace20 emptySpace-xs15"></div>
                    </div>
                    <div class="btnWrapper text-center mb-3">
                        <a class="button btnColor2 orderButton make-order" (click)="addOrder()">ОФОРМИТИ ЗАМОВЛЕННЯ</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
