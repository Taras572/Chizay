<div class="content">
    <div class="row">

        <div class="col-md-6 login-section__item -login">

            <div class="title-block">
                <h2 class="section-title white">Увійти</h2>
                <div class="icon icon-tilde">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22.2 4.6" id="tilde">
                        <path
                            d="M15.6 3.9h-.9c-1.4-.1-2.8-.6-4.1-.9-.8-.3-1.7-.6-2.6-.8-1.5-.3-4.3-.6-6.1 1.1-.2.2-.5.2-.7 0-.2-.2-.2-.6 0-.7 2.1-2 5.3-1.7 7-1.3.9.1 1.8.4 2.7.7 1.3.4 2.6.8 3.9.9 1.9.2 4.5-.3 5.6-2.2.1-.2.4-.3.7-.2.2.1.3.4.2.7-1.2 2-3.6 2.7-5.7 2.7z"
                            fill="#c09560"></path>
                    </svg>
                </div>
            </div>

            <form class="login-section__form" method="post">

                <div class="login-section__form--item">
                    <label for="username">E-mail</label>
                    <input type="text" class="woocommerce-Input woocommerce-Input--text input-text" name="username"
                        id="username" autocomplete="username" value="">
                </div>
                <div class="login-section__form--item">
                    <label for="password">Пароль</label>
                    <span class="password-input"><input class="woocommerce-Input woocommerce-Input--text input-text"
                            type="password" name="password" id="password" autocomplete="current-password"><span
                            class="show-password-input"></span></span>
                </div>
                <div class="login-section__form--item-checkbox">
                    <input class="woocommerce-form__input woocommerce-form__input-checkbox" name="rememberme"
                        type="checkbox" id="login-checkbox" value="forever">
                    <label for="login-checkbox">Пам'ятати мене</label>
                </div>


                <p class="form-row">
                    <input type="hidden" id="woocommerce-login-nonce" name="woocommerce-login-nonce"
                        value="d4c52eb481"><input type="hidden" name="_wp_http_referer" value="/my-account/"> <input
                        type="submit" name="login" class="btn-def white" value="Вхід">

                </p>
                <p class="woocommerce-LostPassword lost_password forgot-pass">
                    <a>Забули ваш пароль?</a>
                </p>


            </form>


        </div>

        <div class="col-md-6 login-section__item -register">
            <div class="title-block">
                <h2 class="section-title black">Реєстрація</h2>
                <div class="icon icon-tilde">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22.2 4.6" id="tilde">
                        <path
                            d="M15.6 3.9h-.9c-1.4-.1-2.8-.6-4.1-.9-.8-.3-1.7-.6-2.6-.8-1.5-.3-4.3-.6-6.1 1.1-.2.2-.5.2-.7 0-.2-.2-.2-.6 0-.7 2.1-2 5.3-1.7 7-1.3.9.1 1.8.4 2.7.7 1.3.4 2.6.8 3.9.9 1.9.2 4.5-.3 5.6-2.2.1-.2.4-.3.7-.2.2.1.3.4.2.7-1.2 2-3.6 2.7-5.7 2.7z"
                            fill="#c09560"></path>
                    </svg>
                </div>
            </div>

            <form method="post" class="login-section__form">

                <div class="login-section__form--item">
                    <label for="year_of_birth">Дата народження <span class="required">*</span></label>
                    <input type="text" class="woocommerce-Input woocommerce-Input--text input-text" name="year_of_birth"
                        id="year_of_birth" value="">
                </div>



                <div class="login-section__form--item">
                    <label for="reg_email">Адреса електронної пошти&nbsp;<span class="required">*</span></label>
                    <input type="email" class="woocommerce-Input woocommerce-Input--text input-text" name="email"
                        id="reg_email" autocomplete="email" value="">
                </div>

                <div class="login-section__form--item">
                    <label for="reg_password">Пароль&nbsp;<span class="required">*</span></label>
                    <span class="password-input"><input type="password"
                            class="woocommerce-Input woocommerce-Input--text input-text" name="password"
                            id="reg_password" autocomplete="new-password"><span
                            class="show-password-input"></span></span>
                </div>

                <div class="login-section__form--item">
                    <label for="reg_password_repeat">Повторіть пароль&nbsp;<span class="required">*</span></label>
                    <span class="password-input"><input type="password"
                            class="woocommerce-Input woocommerce-Input--text input-text" name="password-repeat"
                            id="reg_password_repeat" autocomplete="new-password"><span
                            class="show-password-input"></span></span>
                </div>

                <div class="anr_captcha_field">
                    <div id="anr_captcha_field_1" class="anr_captcha_field_div"><input type="hidden"

                    </div>
                </div>
                <input type="hidden" id="woocommerce-register-nonce" name="woocommerce-register-nonce"
                    value="fc64e6e8b0"><input type="hidden" name="_wp_http_referer" value="/my-account/"> <input
                    type="submit" name="register" class="btn-def black" value="Реєстрація">
           
                <a class="fb-reg">
                    <svg class="icon icon-facebook">
                        <use
                            xlink:href="https://chizay.com/wp-content/themes/chizay-theme/assets/images/svg-sprite.svg#facebook">
                        </use>
                    </svg>
                </a>


            </form>

        </div>

    </div>
</div>
